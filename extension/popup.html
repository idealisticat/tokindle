<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <style>
    body {
      width: 280px;
      padding: 12px;
      font-family: system-ui, sans-serif;
      font-size: 13px;
    }
    h2 { margin: 0 0 8px; font-size: 14px; }
    p { margin: 0 0 10px; color: #555; }
    button {
      width: 100%;
      padding: 10px;
      font-size: 13px;
      cursor: pointer;
      background: #1a73e8;
      color: #fff;
      border: none;
      border-radius: 6px;
    }
    button:hover { background: #1557b0; }
    button:disabled { background: #ccc; cursor: not-allowed; }
    #result { margin-top: 10px; padding: 8px; border-radius: 4px; font-size: 12px; word-break: break-all; }
    .ok { background: #e6f4ea; color: #137333; }
    .err { background: #fce8e6; color: #c5221f; }
    a { color: #1a73e8; }
    .settings { margin-top: 8px; text-align: center; }
    .settings a { font-size: 12px; }
  </style>
</head>
<body>
  <h2>TOKINDLE</h2>
  <p>Convert current tab to EPUB (WeChat article or any page).</p>
  <button id="convert" type="button">Convert to EPUB</button>
  <div id="result"></div>
  <div class="settings"><a href="#" id="settings">Set backend URL</a></div>
  <script src="popup.js"></script>
</body>
</html>
