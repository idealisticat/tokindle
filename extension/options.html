<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>TOKINDLE - Options</title>
  <style>
    body { font-family: system-ui, sans-serif; padding: 20px; max-width: 480px; }
    label { display: block; margin-bottom: 4px; font-weight: 500; }
    input { width: 100%; padding: 8px; margin-bottom: 12px; box-sizing: border-box; }
    button { padding: 8px 16px; background: #1a73e8; color: #fff; border: none; border-radius: 4px; cursor: pointer; }
    .hint { font-size: 12px; color: #666; margin-top: 4px; }
  </style>
</head>
<body>
  <h1>TOKINDLE Options</h1>
  <label for="backend">Backend URL</label>
  <input type="url" id="backend" placeholder="http://127.0.0.1:8000">
  <p class="hint">Where your TOKINDLE backend is running (e.g. http://127.0.0.1:8000 or https://your-server.com).</p>
  <button id="save">Save</button>
  <script src="options.js"></script>
</body>
</html>
